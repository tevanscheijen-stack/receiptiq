services:
  backend:
    build:
      context: ./backend
    environment:
      RECEIPTIQ_DATABASE_URL: sqlite:////data/receiptiq.sqlite3
    volumes:
      - receiptiq_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  receiptiq_data:
